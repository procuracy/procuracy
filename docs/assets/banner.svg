<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 300" role="img" aria-label="procuracy — governance layer for AI agents">
  <title>procuracy</title>
  <desc>Run AI agents your team can trust. Scoped tools. Audited actions. Jira + Slack built in.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="100%" stop-color="#161b3d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff7b3a"/>
      <stop offset="100%" stop-color="#ffb86b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="300" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="75" x2="1280" y2="75"/>
    <line x1="0" y1="225" x2="1280" y2="225"/>
  </g>

  <!-- Title -->
  <text x="80" y="120" font-family="Inter, SF Pro Display, system-ui, sans-serif" font-weight="700" font-size="72" fill="#ffffff" letter-spacing="-1.5">procuracy</text>

  <!-- Accent underline -->
  <rect x="80" y="135" width="100" height="3.5" fill="url(#accent)" rx="2"/>

  <!-- Tagline -->
  <text x="80" y="175" font-family="Inter, SF Pro Text, system-ui, sans-serif" font-weight="400" font-size="24" fill="#c8cce8">Run AI agents your team can trust.</text>

  <!-- Three value props -->
  <g transform="translate(80, 220)" font-family="Inter, SF Mono, ui-monospace, monospace" font-size="14" font-weight="600" letter-spacing="2.5" text-transform="uppercase">
    <text x="0" y="0" fill="#ffffff">SCOPED TOOLS</text>
    <circle cx="135" cy="-4" r="2.5" fill="#ff7b3a"/>
    <text x="150" y="0" fill="#ffffff">AUDITED ACTIONS</text>
    <circle cx="330" cy="-4" r="2.5" fill="#ff7b3a"/>
    <text x="345" y="0" fill="#ffffff">JIRA + SLACK</text>
    <circle cx="480" cy="-4" r="2.5" fill="#ff7b3a"/>
    <text x="495" y="0" fill="#ffffff">KILL SWITCH</text>
  </g>

  <!-- Meta -->
  <text x="80" y="265" font-family="SF Mono, ui-monospace, Menlo, monospace" font-weight="500" font-size="12" fill="#6b7299" letter-spacing="0.5">open source · apache 2.0 · no phone-home</text>

  <!-- Right side: the flow -->
  <g transform="translate(820, 65)" opacity="0.85">
    <rect x="0" y="0" width="380" height="185" rx="10" fill="none" stroke="#2a3060" stroke-width="1"/>
    <rect x="0" y="0" width="380" height="26" rx="10" fill="#1a2046"/>
    <rect x="0" y="16" width="380" height="10" fill="#1a2046"/>
    <circle cx="14" cy="13" r="4" fill="#ff5f57"/>
    <circle cx="28" cy="13" r="4" fill="#febc2e"/>
    <circle cx="42" cy="13" r="4" fill="#28c840"/>
    <text x="200" y="17" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#6b7299">the flow</text>

    <g font-family="ui-monospace, SF Mono, Menlo, monospace" font-size="12.5">
      <text x="20" y="52" fill="#6b7299">$</text>
      <text x="35" y="52" fill="#ffb86b">procuracy init</text>
      <text x="185" y="52" fill="#6b7299"># scaffold</text>

      <text x="20" y="76" fill="#6b7299">$</text>
      <text x="35" y="76" fill="#ffb86b">procuracy request</text>
      <text x="215" y="76" fill="#6b7299"># Jira approval</text>

      <text x="20" y="100" fill="#6b7299">$</text>
      <text x="35" y="100" fill="#ffb86b">procuracy hire</text>
      <text x="185" y="100" fill="#6b7299"># provision</text>

      <text x="20" y="124" fill="#6b7299">$</text>
      <text x="35" y="124" fill="#28c840">procuracy run</text>
      <text x="175" y="124" fill="#6b7299"># → Slack + audit</text>

      <text x="20" y="148" fill="#6b7299">$</text>
      <text x="35" y="148" fill="#ffb86b">procuracy verify</text>
      <text x="200" y="148" fill="#6b7299"># tamper check</text>

      <text x="20" y="172" fill="#6b7299">$</text>
      <text x="35" y="172" fill="#ffb86b">procuracy watch</text>
      <text x="200" y="172" fill="#6b7299"># Jira daemon</text>
    </g>
  </g>
</svg>

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" role="img" aria-label="procuracy — hire AI contractors into your engineering team">
  <title>procuracy</title>
  <desc>Open-source framework for hiring AI contractors with identity, scope, audit, and a kill switch.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="100%" stop-color="#161b3d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff7b3a"/>
      <stop offset="100%" stop-color="#ffb86b"/>
    </linearGradient>
    <style>
      .title    { font: 700 92px "Inter", "SF Pro Display", system-ui, -apple-system, sans-serif; fill: #ffffff; letter-spacing: -2px; }
      .tagline  { font: 400 26px "Inter", "SF Pro Text", system-ui, -apple-system, sans-serif; fill: #c8cce8; letter-spacing: 0.2px; }
      .pillar   { font: 600 16px "Inter", "SF Mono", ui-monospace, monospace; fill: #ffffff; letter-spacing: 3px; text-transform: uppercase; }
      .dot      { fill: #ff7b3a; }
      .meta     { font: 500 13px "SF Mono", ui-monospace, "Menlo", monospace; fill: #6b7299; letter-spacing: 1px; }
      .frame    { fill: none; stroke: #2a3060; stroke-width: 1; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1280" height="320" fill="url(#bg)"/>

  <!-- Subtle grid accent (very faint) -->
  <g opacity="0.06" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="80"  x2="1280" y2="80"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
  </g>

  <!-- Top-left meta -->
  <text x="80" y="56" class="meta">v0.1.0-dev · apache 2.0 · go 1.25</text>

  <!-- Title -->
  <text x="80" y="170" class="title">procuracy</text>

  <!-- Accent underline -->
  <rect x="80" y="188" width="120" height="4" fill="url(#accent)" rx="2"/>

  <!-- Tagline -->
  <text x="80" y="232" class="tagline">Hire AI contractors into your engineering team.</text>

  <!-- Pillars row -->
  <g transform="translate(80, 278)">
    <text x="0"   y="0" class="pillar">IDENTITY</text>
    <circle cx="118" cy="-5" r="3" class="dot"/>
    <text x="135" y="0" class="pillar">SCOPE</text>
    <circle cx="220" cy="-5" r="3" class="dot"/>
    <text x="237" y="0" class="pillar">AUDIT</text>
    <circle cx="320" cy="-5" r="3" class="dot"/>
    <text x="337" y="0" class="pillar">KILL SWITCH</text>
  </g>

  <!-- Right-side decorative manifest snippet -->
  <g transform="translate(820, 70)" opacity="0.85">
    <rect x="0" y="0" width="380" height="200" rx="10" class="frame"/>
    <rect x="0" y="0" width="380" height="28" rx="10" fill="#1a2046"/>
    <rect x="0" y="18" width="380" height="10" fill="#1a2046"/>
    <circle cx="14" cy="14" r="4" fill="#ff5f57"/>
    <circle cx="28" cy="14" r="4" fill="#febc2e"/>
    <circle cx="42" cy="14" r="4" fill="#28c840"/>
    <text x="200" y="19" text-anchor="middle" font="600 11px ui-monospace, monospace" fill="#6b7299" font-family="ui-monospace, monospace" font-size="11">procuracy.yaml</text>

    <g font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13">
      <text x="20" y="56"  fill="#c8cce8">name: <tspan fill="#ffb86b">aria</tspan></text>
      <text x="20" y="78"  fill="#6b7299">scopes:</text>
      <text x="34" y="98"  fill="#c8cce8">github:</text>
      <text x="48" y="118" fill="#9ba0c5">- read:org/*</text>
      <text x="48" y="138" fill="#9ba0c5">- write:org/docs/**</text>
      <text x="48" y="158" fill="#ff7b3a">- merge:none</text>
      <text x="20" y="182" fill="#6b7299">runtime:</text>
    </g>
  </g>
</svg>

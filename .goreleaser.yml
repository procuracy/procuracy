version: 2

builds:
  - id: procuracy
    main: ./cmd/procuracy
    binary: procuracy
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: procuracy
    builds:
      - procuracy
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "procuracy_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^ci:"
      - "^deps:"
      - "Merge pull request"
